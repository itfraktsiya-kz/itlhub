<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IT Lyceum School Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Preloader -->
    <div id="preloader" class="preloader">
        <div class="loader"></div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal">
        <div class="auth-container">
            <div class="auth-header"> 
                <div class="logo">
                    <div class="logo-icon">
                        <a href="https://ibb.co.com/PvNvsYkF"><img src="https://i.ibb.co.com/PvNvsYkF/483c533e-d1bb-4c30-889e-824027a0aedb.jpg" alt="483c533e-d1bb-4c30-889e-824027a0aedb" border="0"></a>
                    </div>
                    <h2>IT Lyceum School</h2>
                </div>
                <p id="authTitle">Тіркелу</p>
            </div>
            
            <!-- Registration Form (shown first) -->
            <div class="auth-form" id="registerForm">
                <div class="input-group">
                    <input type="text" id="regFullName" placeholder=" " class="form-input">
                    <label class="input-label">Толық аты-жөні</label>
                </div>
                <div class="input-group">
                    <input type="text" id="regLogin" placeholder=" " class="form-input">
                    <label class="input-label">Логин</label>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder=" " class="form-input">
                    <label class="input-label">Құпия сөз</label>
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirmPassword" placeholder=" " class="form-input">
                    <label class="input-label">Құпия сөзді растау</label>
                </div>
                <div class="input-group">
                    <select id="regClass" class="form-input">
                        <option value="">Сыныпты таңдаңыз</option>
                        <option value="5А">5А</option>
                        <option value="5Ә">5Ә</option>
                        <option value="5Б">5Б</option>
                        <option value="5В">5В</option>
                        <option value="6А">6А</option>
                        <option value="6Ә">6Ә</option>
                        <option value="6Б">6Б</option>
                        <option value="6В">6В</option>
                        <option value="7А">7А</option>
                        <option value="7Ә">7Ә</option>
                        <option value="7Б">7Б</option>
                        <option value="7В">7В</option>
                        <option value="8А">8А</option>
                        <option value="8Ә">8Ә</option>
                        <option value="8Б">8Б</option>
                        <option value="8В">8В</option>
                        <option value="9А">9А</option>
                        <option value="9Ә">9Ә</option>
                        <option value="9Б">9Б</option>
                        <option value="9В">9В</option>
                        <option value="10А">10А</option>
                        <option value="10Ә">10Ә</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-animated" id="registerBtn">
                    <span class="btn-text">Тіркелу</span>
                    <div class="btn-loader"></div>
                </button>
                
                <div class="auth-switch">
                    <span>Тіркелгіңіз бар ма?</span>
                    <button id="switchToLogin" class="link-btn">Кіру</button>
                </div>
            </div>

            <!-- Login Form (hidden by default) -->
            <div class="auth-form" id="loginForm" style="display: none;">
                <div class="input-group">
                    <input type="text" id="loginInput" placeholder=" " class="form-input">
                    <label class="input-label" id="loginLabel">Логин</label>
                </div>
                <div class="input-group">
                    <input type="password" id="passwordInput" placeholder=" " class="form-input">
                    <label class="input-label" id="passwordLabel">Құпия сөз</label>
                </div>
                <button class="btn btn-primary btn-animated" id="loginBtn">
                    <span class="btn-text" id="loginBtnText">Кіру</span>
                    <div class="btn-loader"></div>
                </button>
                
                <div class="auth-switch">
                    <span>Тіркелгіңіз жоқ па?</span>
                    <button id="switchToRegister" class="link-btn">Тіркелу</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="appContainer" class="app-container">
        <!-- Mobile Header -->
        <div class="mobile-header">
            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="mobile-logo">
                <img src="https://i.ibb.co.com/67RpcsRx/b12c476b-d92a-47dd-b730-51473f10066e.jpg" alt="IT Lyceum">
                <span>IT Lyceum</span>
            </div>
            <div class="mobile-controls">
                <button class="mobile-control-btn theme-toggle-mobile" id="themeToggleMobile" title="Тақырыпты өзгерту">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="mobile-user-menu">
                    <button class="mobile-control-btn user-btn-mobile" id="userBtnMobile">
                        <div class="user-avatar-mobile">
                            <span id="userAvatarMobile">АӘ</span>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu Overlay -->
        <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <img src="https://i.ibb.co.com/67RpcsRx/b12c476b-d92a-47dd-b730-51473f10066e.jpg" alt="IT Lyceum Logo">
                    </div>
                    <h2>IT Lyceum</h2>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <nav class="sidebar-menu">
                <div class="menu-item active" data-page="school">
                    <div class="menu-icon"><i class="fas fa-school"></i></div>
                    <span class="menu-text" data-key="school">Мектеп туралы</span>
                </div>
                <div class="menu-item" data-page="news">
                    <div class="menu-icon"><i class="fas fa-newspaper"></i></div>
                    <span class="menu-text" data-key="news">Жаңалықтар</span>
                </div>
                <div class="menu-item" data-page="teachers">
                    <div class="menu-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                    <span class="menu-text" data-key="teachers">Мұғалімдер</span>
                </div>
                <div class="menu-item" data-page="students">
                    <div class="menu-icon"><i class="fas fa-user-graduate"></i></div>
                    <span class="menu-text" data-key="students">Оқушылар</span>
                </div>
                <div class="menu-item" data-page="events">
                    <div class="menu-icon"><i class="fas fa-calendar-alt"></i></div>
                    <span class="menu-text" data-key="events">Іс-шаралар</span>
                </div>
                <div class="menu-item" data-page="profile">
                    <div class="menu-icon"><i class="fas fa-user-circle"></i></div>
                    <span class="menu-text" data-key="profile">Жеке кабинет</span>
                </div>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <div class="breadcrumb">
                        <span class="page-name" id="pageName">Мектеп туралы</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="header-btn theme-toggle" id="themeToggle" title="Тақырыпты өзгерту">
                        <div class="theme-icon">
                            <div class="sun"></div>
                            <div class="moon"></div>
                            <div class="stars">
                                <div class="star"></div>
                                <div class="star"></div>
                                <div class="star"></div>
                            </div>
                        </div>
                    </button>
                    
                    <div class="language-switcher">
                        <button class="header-btn lang-toggle" id="langToggle">
                            <span class="lang-text">KK</span>
                            <span class="lang-arrow">▼</span>
                        </button>
                        <div class="lang-dropdown" id="langDropdown">
                            <div class="lang-option" data-lang="kk">
                                <span class="lang-flag">🇰🇿</span>
                                Қазақша
                            </div>
                            <div class="lang-option" data-lang="ru">
                                <span class="lang-flag">🇷🇺</span>
                                Русский
                            </div>
                            <div class="lang-option" data-lang="en">
                                <span class="lang-flag">🇺🇸</span>
                                English
                            </div>
                        </div>
                    </div>
                    
                    <div class="user-menu">
                        <button class="header-btn user-btn" id="userBtn">
                            <div class="user-avatar">
                                <span id="userAvatar">АӘ</span>
                            </div>
                            <span class="user-name" id="userName">Әділ Әділов</span>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <main id="content" class="content">
                <!-- Content will be loaded here -->
            </main>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
